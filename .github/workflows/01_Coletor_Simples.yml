name: 🕒 01 Coletor Simples (Agendado)

on:
  schedule:
    # AGORA VOCÊ PODE COLOCAR DIRETO EM HORÁRIO DE BRASÍLIA!
    - cron: '45 8,9,11,13,14,15,16,17 * * 1-5'
  workflow_dispatch: 

jobs:
  executar_rotina:
    runs-on: ubuntu-latest
    
    env:
      TZ: America/Sao_Paulo
      CPFL_USER: ${{ secrets.CPFL_USER }}
      CPFL_PASS: ${{ secrets.CPFL_PASS }}
      SP_CLIENT_ID: ${{ secrets.SP_CLIENT_ID }}
      SP_CLIENT_SECRET: ${{ secrets.SP_CLIENT_SECRET }}
      SP_TENANT_ID: ${{ secrets.SP_TENANT_ID }}
      SP_SITE_URL: ${{ secrets.SP_SITE_URL }}

    steps:
      - name: 📥 1. Sincronizar Repositório
        uses: actions/checkout@v4

      - name: 🕐 2. Configurar Timezone e Validar Horário
        run: |
          # Define timezone para todo o sistema
          sudo timedatectl set-timezone America/Sao_Paulo
          echo "Horário atual (Brasília): $(date)"
          echo "Esperado: Execução nos horários 08:45, 09:45, 11:45, 13:45, 14:45, 15:45, 16:45, 17:45"

      - name: 🐍 3. Preparar Ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 4. Instalar Bibliotecas Necessárias
        run: |
          pip install playwright requests python-dotenv
          playwright install chromium --with-deps

      - name: 🚀 5. Executar PDL Analitico
        run: python3 02_PDL_Analitico.py

      - name: ⏳ 6. Aguardar Processamento Portal (180s)
        run: sleep 180

      - name: 🚀 7. Executar Nao Visitadas
        run: python3 04_Nao_Visitadas.py

      - name: ⏳ 8. Aguardar Processamento Portal (180s)
        run: sleep 180

      - name: 🚀 9. Executar ELF Hora
        run: python3 01_ELF_Hora.py

      - name: ⏳ 10. Aguardar Finalização ELF (300s)
        run: sleep 300

      - name: 🤖 11. Rodar Coletor e Upload SharePoint
        run: python3 00a_Coletor.py "Leitura" "Visitadas" "Produtividade"

      - name: 📸 12. Salvar Screenshots em caso de erro
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-erro
          path: ./01_LEC/*.png
          retention-days: 1