name: 🏢 TESTE SITE E DRIVE

on:
  workflow_dispatch:

jobs:
  teste_site:
    runs-on: ubuntu-latest
    
    env:
      SP_CLIENT_ID: ${{ secrets.SP_CLIENT_ID }}
      SP_CLIENT_SECRET: ${{ secrets.SP_CLIENT_SECRET }}
      SP_TENANT_ID: ${{ secrets.SP_TENANT_ID }}

    steps:
      - name: Testar Site ID e Drive
        run: |
          pip install requests
          python3 << 'EOF'
          import os
          import requests
          from urllib.parse import urlparse

          print("=" * 60)
          print("TESTE DE SITE ID E DRIVE WORKSPACE")
          print("=" * 60)

          # Credenciais
          SP_CLIENT_ID = os.getenv("SP_CLIENT_ID").strip()
          SP_CLIENT_SECRET = os.getenv("SP_CLIENT_SECRET").strip()
          SP_TENANT_ID = os.getenv("SP_TENANT_ID").strip()
          SITE_URL = "https://engelmigproject.sharepoint.com/sites/LEC_ENGELMIG"

          print("\n1. OBTENDO TOKEN...")
          url_token = f'https://login.microsoftonline.com/{SP_TENANT_ID}/oauth2/v2.0/token'
          data = {
              'grant_type': 'client_credentials',
              'client_id': SP_CLIENT_ID,
              'client_secret': SP_CLIENT_SECRET,
              'scope': 'https://graph.microsoft.com/.default'
          }
          r = requests.post(url_token, data=data)
          r.raise_for_status()
          token = r.json()['access_token']
          print("   ✅ Token OK")

          print("\n2. OBTENDO SITE ID...")
          parsed = urlparse(SITE_URL)
          host = parsed.netloc
          site_path = parsed.path.strip("/")
          url_site = f"https://graph.microsoft.com/v1.0/sites/{host}:/{site_path}"
          print(f"   URL: {url_site}")
          
          headers = {"Authorization": f"Bearer {token}"}
          r = requests.get(url_site, headers=headers)
          
          if r.status_code != 200:
              print(f"   ❌ ERRO: {r.status_code}")
              print(f"   Resposta: {r.text}")
              exit(1)
          
          site_id = r.json()["id"]
          print(f"   ✅ Site ID: {site_id}")

          print("\n3. LISTANDO DRIVES (BIBLIOTECAS)...")
          url_drives = f"https://graph.microsoft.com/v1.0/sites/{site_id}/drives"
          r = requests.get(url_drives, headers={"Authorization": f"Bearer {token}"})
          
          if r.status_code != 200:
              print(f"   ❌ ERRO: {r.status_code}")
              print(f"   Resposta: {r.text}")
              exit(1)
          
          drives = r.json().get('value', [])
          print(f"   📁 Bibliotecas encontradas: {len(drives)}")
          
          drive_id = None
          for drive in drives:
              print(f"      - {drive.get('name')}: {drive.get('id')}")
              if drive.get('name') == 'Workspace':
                  drive_id = drive.get('id')
                  print(f"\n   ✅ Biblioteca Workspace encontrada!")
                  print(f"      ID: {drive_id}")
          
          if not drive_id:
              print("\n   ❌ Biblioteca 'Workspace' NÃO encontrada!")
              print("   Bibliotecas disponíveis:")
              for drive in drives:
                  print(f"      - {drive.get('name')}")
              exit(1)

          print("\n4. TESTANDO UPLOAD DE ARQUIVO SIMPLES...")
          pasta = "BI_LEC/01_ELF_Diario"
          nome_arquivo = "teste_final_workspace.txt"
          conteudo = "Teste final - funcionou! - " + str(__import__('datetime').datetime.now())
          
          url_upload = f"https://graph.microsoft.com/v1.0/sites/{site_id}/drives/{drive_id}/root:/{pasta}/{nome_arquivo}:/content"
          print(f"   URL: {url_upload[:100]}...")
          
          headers_upload = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "text/plain"
          }
          r = requests.put(url_upload, headers=headers_upload, data=conteudo.encode('utf-8'))
          
          if r.status_code in [200, 201]:
              print("   ✅ Upload realizado com sucesso!")
              print(f"   URL do arquivo: {r.json().get('webUrl')}")
          else:
              print(f"   ❌ Erro no upload: {r.status_code}")
              print(f"   Resposta: {r.text}")
              exit(1)

          print("\n" + "=" * 60)
          print("✅ TESTE CONCLUÍDO COM SUCESSO!")
          print("=" * 60)
          EOF