name: 📸 Envio de Prints WhatsApp

on:
  schedule:
    - cron: '0 8 * * *'  # Executa todos os dias às 08:00
  workflow_dispatch:      # Permite executar manualmente

jobs:
  enviar_prints:
    runs-on: ubuntu-latest
    
    env:
      TZ: America/Sao_Paulo
      PYTHONUNBUFFERED: 1
      PB_USER: ${{ secrets.PB_USER }}
      PB_PASS: ${{ secrets.PB_PASS }}

    steps:
      - name: 📥 Sincronizar Repositório
        uses: actions/checkout@v4

      - name: 🐍 Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar Dependências
        run: |
          pip install --upgrade pip
          pip install playwright pillow
          playwright install chromium --with-deps

      - name: 🔓 Restaurar Sessão WhatsApp
        run: |
          mkdir -p whatsapp_session
          if [ -n "${{ secrets.WHATSAPP_SESSION }}" ]; then
            echo "${{ secrets.WHATSAPP_SESSION }}" | base64 -d > session.zip
            unzip session.zip -d whatsapp_session/
            rm session.zip
            echo "✅ Sessão WhatsApp restaurada"
          else
            echo "⚠️ Secret WHATSAPP_SESSION não configurado"
          fi

      - name: 📸 Capturar Prints e Enviar
        run: python3 envia_prints.py

      - name: 📎 Salvar Prints como Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: powerbi-prints
          path: prints/
          retention-days: 7