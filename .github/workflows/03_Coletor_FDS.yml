name: 🏖️ 03 Coletor FDS (Sábado)

on:
  workflow_dispatch:

jobs:
  executar_fds:
    runs-on: ubuntu-latest

    env:
      CPFL_USER: ${{ secrets.CPFL_USER }}
      CPFL_PASS: ${{ secrets.CPFL_PASS }}
      SP_CLIENT_ID: ${{ secrets.SP_CLIENT_ID }}
      SP_CLIENT_SECRET: ${{ secrets.SP_CLIENT_SECRET }}
      SP_TENANT_ID: ${{ secrets.SP_TENANT_ID }}
      SP_SITE_URL: ${{ secrets.SP_SITE_URL }}

    steps:
      - name: 📥 1. Sincronizar Repositório
        uses: actions/checkout@v4

      - name: 🐍 2. Preparar Ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 3. Instalar Bibliotecas
        run: |
          pip install playwright requests python-dotenv
          playwright install chromium --with-deps

      - name: 🚀 4. Executar 02_PDL_Analitico
        run: python3 02_PDL_Analitico.py

      - name: ⏳ 5. Aguardar 6 minutos (portal processar)
        run: sleep 360

      - name: 🚀 6. Executar 04_Nao_Visitadas
        run: python3 04_Nao_Visitadas.py

      - name: ⏳ 7. Aguardar 4 minutos (portal processar)
        run: sleep 240

      - name: 🚀 8. Executar 00b_Coletor_FDS
        run: python3 00b_Coletor_FDS.py