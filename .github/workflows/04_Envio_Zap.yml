name: 💬 04 Envio WhatsApp (Agendado)

on:
  #schedule:
    # Brasília: 08:45 às 18:45 (de hora em hora, exceto 12:45)
    # Convertido para UTC (+3h): 11:45 às 21:45 (exceto 15:45)
  #  - cron: '45 11,12,14,15,16,17,18,19,20,21 * * 1-5'
  workflow_dispatch:

jobs:
  executar_envio:
    runs-on: ubuntu-latest
    
    # --- CONFIGURAÇÃO GLOBAL ---
    env:
      CPFL_USER: ${{ secrets.CPFL_USER }}
      CPFL_PASS: ${{ secrets.CPFL_PASS }}
      # Adicione aqui outras chaves se o seu script de Zap precisar (ex: Token API)
      SP_CLIENT_ID: ${{ secrets.SP_CLIENT_ID }}
      SP_CLIENT_SECRET: ${{ secrets.SP_CLIENT_SECRET }}
      SP_TENANT_ID: ${{ secrets.SP_TENANT_ID }}
      SP_SITE_URL: ${{ secrets.SP_SITE_URL }}

    defaults:
      run:
        working-directory: ./01_LEC

    steps:
      - name: 📥 1. Sincronizar Repositório
        uses: actions/checkout@v4

      - name: 🐍 2. Preparar Ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 3. Instalar Bibliotecas
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: 📸 4. Executar Captura e Envio WhatsApp
        # Substitui o 'python 00_Print_Telas.py' do seu .bat
        run: python3 00_Print_Telas.py
