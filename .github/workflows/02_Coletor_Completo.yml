name: 📊 02 Coletor Completo (Agendado)

on:
  workflow_dispatch:

jobs:
  executar_completo:
    runs-on: ubuntu-latest
    
    env:
      TZ: America/Sao_Paulo
      CPFL_USER: ${{ secrets.CPFL_USER }}
      CPFL_PASS: ${{ secrets.CPFL_PASS }}
      SP_CLIENT_ID: ${{ secrets.SP_CLIENT_ID }}
      SP_CLIENT_SECRET: ${{ secrets.SP_CLIENT_SECRET }}
      SP_TENANT_ID: ${{ secrets.SP_TENANT_ID }}
      PYTHONUNBUFFERED: 1

    steps:
      - name: 📥 1. Sincronizar Repositório
        uses: actions/checkout@v4

      - name: 🐍 2. Preparar Ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 3. Instalar Bibliotecas
        run: |
          pip install --upgrade pip
          pip install playwright requests python-dotenv
          playwright install chromium --with-deps

      - name: 🚀 4. [PASSO 1] Executar 02_PDL_Analitico
        run: python3 02_PDL_Analitico.py

      - name: 🚀 5. [PASSO 2] Executar 04_Nao_Visitadas
        run: python3 04_Nao_Visitadas.py

      - name: ⏳ 6. Aguardar (60s)
        run: sleep 60

      - name: 🚀 7. [PASSO 3] Executar 05_Nao_Visitadas_Historico
        run: python3 05_Nao_Visitadas_Historico.py

      - name: 🚀 8. [PASSO 4] Executar 06_Impedimentos
        run: python3 06_Impedimentos.py

      - name: 🚀 9. [PASSO 5] Executar 07_Entregas
        run: python3 07_Entregas.py

      - name: ⏳ 10. Aguardar (240s)
        run: sleep 240

      - name: 🚀 11. [PASSO 6] Executar 01_ELF_Hora
        run: python3 01_ELF_Hora.py

      - name: 🚀 12. [PASSO 7] Executar 03_Nao_Lib_Fatura
        run: python3 03_Nao_Lib_Fatura.py

      - name: ⏳ 13. Aguardar (480s)
        run: sleep 480

      - name: 🤖 14. Rodar Coletor Final - MODO COMPLETO
        run: python3 -u 00a_Coletor.py completo